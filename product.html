<script src="products.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const product = PRODUCTS.find(p => p.id === id);

const userId = localStorage.getItem("discordId"); // temporary

async function checkOwnership() {
  try {
    const res = await fetch(`http://YOUR_SERVER_IP:3000/api/owns?user=${userId}&product=${id}`);
    const data = await res.json();

    if (data.owns) {
      document.getElementById("product").innerHTML += `
        <h2 style="color:lime;">✔ Owned</h2>
      `;
    }
  } catch {
    document.getElementById("product").innerHTML += `
      <h2 style="color:yellow;">⚠ Bot offline</h2>
    `;
  }
}

document.getElementById("product").innerHTML = `
<h1>${product.name}</h1>
<img src="${product.image}">
<p>${product.desc}</p>
<button onclick="buy()">Buy</button>
`;

function buy(){
  window.location.href = product.gamepass;
}

checkOwnership();
</script>
