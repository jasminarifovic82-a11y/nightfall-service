<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="product"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const products = {
  license1: {
    name: "Nightfall License",
    desc: "Best retail bot license",
    image: "https://via.placeholder.com/200",
    gamepass: "https://www.roblox.com/game-pass/123456"
  }
};

const p = products[id];

document.getElementById("product").innerHTML = `
<h1>${p.name}</h1>
<img src="${p.image}">
<p>${p.desc}</p>

<button onclick="buy()">Buy</button>
`;

function buy(){
window.location.href = p.gamepass;
}
</script>

</body>
</html>
